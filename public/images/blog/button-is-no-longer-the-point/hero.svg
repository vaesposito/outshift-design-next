<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Button Is No Longer the Point">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="0.55" stop-color="#0d1b30"/>
      <stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00bceb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00bceb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#187adc" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#187adc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fe3ff"/>
      <stop offset="1" stop-color="#00bceb"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a5a82" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#00bceb" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#3a5a82" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="930" cy="180" r="420" fill="url(#glowCyan)"/>
  <circle cx="240" cy="520" r="360" fill="url(#glowBlue)"/>

  <!-- subtle dot grid -->
  <g fill="#9fc6e8" fill-opacity="0.06">
    <circle cx="120" cy="120" r="2.5"/><circle cx="200" cy="120" r="2.5"/><circle cx="280" cy="120" r="2.5"/>
    <circle cx="120" cy="200" r="2.5"/><circle cx="200" cy="200" r="2.5"/><circle cx="280" cy="200" r="2.5"/>
    <circle cx="1080" cy="430" r="2.5"/><circle cx="1000" cy="430" r="2.5"/><circle cx="920" cy="430" r="2.5"/>
    <circle cx="1080" cy="510" r="2.5"/><circle cx="1000" cy="510" r="2.5"/><circle cx="920" cy="510" r="2.5"/>
  </g>

  <!-- relationship motif: two nodes connected -->
  <g transform="translate(0,470)">
    <line x1="690" y1="0" x2="1010" y2="0" stroke="url(#line)" stroke-width="2"/>
    <circle cx="690" cy="0" r="22" fill="none" stroke="#6e87a6" stroke-width="2"/>
    <circle cx="690" cy="0" r="7" fill="#9fc6e8" fill-opacity="0.8"/>
    <circle cx="1010" cy="0" r="58" fill="url(#glowCyan)"/>
    <circle cx="1010" cy="0" r="26" fill="url(#node)"/>
    <circle cx="850" cy="0" r="5" fill="#00bceb"/>
  </g>

  <!-- eyebrow -->
  <text x="100" y="150" fill="#5fd0f0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3">OUTSHIFT &#183; THE HUMAN-AGENT EXPERIENCE</text>

  <!-- title -->
  <text x="100" y="280" fill="#eaf2fb" font-family="Inter, Helvetica, Arial, sans-serif" font-size="76" font-weight="700">The Button Is No</text>
  <text x="100" y="368" fill="#eaf2fb" font-family="Inter, Helvetica, Arial, sans-serif" font-size="76" font-weight="700">Longer the Point</text>

  <!-- subtitle -->
  <text x="103" y="430" fill="#9fb6d2" font-family="Inter, Helvetica, Arial, sans-serif" font-size="26" font-weight="400">Designing the relationship between humans and intelligent systems</text>
</svg>
