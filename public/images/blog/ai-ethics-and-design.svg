<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a"/>
      <stop offset="55%" style="stop-color:#0b1e38"/>
      <stop offset="100%" style="stop-color:#0f2a4a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="72%" cy="38%" r="42%">
      <stop offset="0%" style="stop-color:#00bceb;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#00bceb;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="72%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <clipPath id="clip"><rect width="800" height="450"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="800" height="450" fill="url(#bg)"/>
    <rect width="800" height="450" fill="url(#glow1)"/>
    <rect width="800" height="450" fill="url(#glow2)"/>

    <!-- Subtle grid lines -->
    <g stroke="rgba(0,188,235,0.06)" stroke-width="1">
      <line x1="0" y1="75" x2="800" y2="75"/>
      <line x1="0" y1="150" x2="800" y2="150"/>
      <line x1="0" y1="225" x2="800" y2="225"/>
      <line x1="0" y1="300" x2="800" y2="300"/>
      <line x1="0" y1="375" x2="800" y2="375"/>
      <line x1="133" y1="0" x2="133" y2="450"/>
      <line x1="267" y1="0" x2="267" y2="450"/>
      <line x1="400" y1="0" x2="400" y2="450"/>
      <line x1="533" y1="0" x2="533" y2="450"/>
      <line x1="667" y1="0" x2="667" y2="450"/>
    </g>

    <!-- Large decorative circle (right side) -->
    <circle cx="620" cy="175" r="160" fill="none" stroke="rgba(0,188,235,0.12)" stroke-width="1"/>
    <circle cx="620" cy="175" r="120" fill="none" stroke="rgba(0,188,235,0.09)" stroke-width="1"/>
    <circle cx="620" cy="175" r="80" fill="none" stroke="rgba(0,188,235,0.07)" stroke-width="1"/>

    <!-- Accent circle glow -->
    <circle cx="620" cy="175" r="40" fill="rgba(0,188,235,0.08)" filter="url(#blur1)"/>
    <circle cx="620" cy="175" r="18" fill="rgba(0,188,235,0.22)"/>
    <circle cx="620" cy="175" r="10" fill="rgba(0,188,235,0.5)"/>

    <!-- Connecting lines from circle -->
    <line x1="580" y1="175" x2="460" y2="270" stroke="rgba(0,188,235,0.15)" stroke-width="1"/>
    <line x1="620" y1="215" x2="540" y2="310" stroke="rgba(0,188,235,0.1)" stroke-width="1"/>
    <line x1="660" y1="200" x2="720" y2="300" stroke="rgba(0,188,235,0.1)" stroke-width="1"/>

    <!-- Small dot nodes -->
    <circle cx="460" cy="270" r="4" fill="rgba(0,188,235,0.4)"/>
    <circle cx="540" cy="310" r="3" fill="rgba(99,102,241,0.45)"/>
    <circle cx="720" cy="300" r="3" fill="rgba(0,188,235,0.35)"/>
    <circle cx="390" cy="320" r="5" fill="rgba(99,102,241,0.35)"/>
    <line x1="460" y1="270" x2="390" y2="320" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>

    <!-- Left accent bar -->
    <rect x="60" y="100" width="3" height="48" rx="2" fill="#00bceb" opacity="0.7"/>

    <!-- Type label -->
    <text x="74" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(0,188,235,0.85)" text-transform="uppercase">RESEARCH REPORT</text>

    <!-- Main title -->
    <text x="60" y="180" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#e8f4fb">The Strategic Role</text>
    <text x="60" y="216" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#e8f4fb">of Design in Shaping</text>
    <text x="60" y="252" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#00bceb">Ethical AI Systems</text>

    <!-- Subtitle -->
    <text x="60" y="292" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="rgba(180,210,230,0.6)">Designing Responsible Intelligence</text>

    <!-- Divider -->
    <line x1="60" y1="318" x2="300" y2="318" stroke="rgba(0,188,235,0.2)" stroke-width="1"/>

    <!-- Footer meta -->
    <text x="60" y="342" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" fill="rgba(180,210,230,0.45)">Outshift by Cisco  ·  May 2026</text>

    <!-- Outshift wordmark area -->
    <text x="60" y="410" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" font-weight="500" fill="rgba(0,188,235,0.4)" letter-spacing="1">OUTSHIFT DESIGN</text>
  </g>
</svg>
