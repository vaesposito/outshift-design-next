<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#0f1117"/>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="50%" stop-color="#141824"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BCEB"/>
      <stop offset="50%" stop-color="#187ADC"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCEB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#187ADC" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#187ADC" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="clip"><rect width="1200" height="600"/></clipPath>
    <!-- Directional arrowhead for workflow connectors (matches accent line color) -->
    <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" viewBox="0 0 10 10" refX="8.5" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="url(#accentGrad)"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- Ambient glow circles -->
  <circle cx="300" cy="300" r="200" fill="#00BCEB" fill-opacity="0.04"/>
  <circle cx="900" cy="300" r="220" fill="#8B5CF6" fill-opacity="0.05"/>
  <circle cx="600" cy="300" r="160" fill="#187ADC" fill-opacity="0.04"/>

  <!-- Connection lines (workflow) - directional arrows forming the cycle:
       designer -> prompt -> agent -> iteration -> output -> refinement -> ai agent -> review -> designer -->
  <g opacity="0.35" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6 4">
    <!-- designer -> prompt -->
    <line x1="195" y1="300" x2="345" y2="210" marker-end="url(#arrowhead)"/>
    <!-- prompt -> agent -->
    <line x1="385" y1="210" x2="555" y2="260" marker-end="url(#arrowhead)"/>
    <!-- agent -> iteration -->
    <line x1="600" y1="300" x2="770" y2="215" marker-end="url(#arrowhead)"/>
    <!-- iteration -> output -->
    <line x1="810" y1="215" x2="980" y2="175" marker-end="url(#arrowhead)"/>
    <!-- output -> refinement (reversed from original) -->
    <line x1="980" y1="425" x2="810" y2="385" marker-end="url(#arrowhead)"/>
    <!-- refinement -> ai agent (reversed; ends at agent edge) -->
    <line x1="770" y1="385" x2="654" y2="324" marker-end="url(#arrowhead)"/>
    <!-- ai agent -> review (reversed from original) -->
    <line x1="555" y1="340" x2="385" y2="390" marker-end="url(#arrowhead)"/>
    <!-- review -> designer (reversed; ends at designer edge) -->
    <line x1="345" y1="390" x2="206" y2="320" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Solid lines (primary spine: agent -> output) -->
  <g opacity="0.6" stroke="url(#accentGrad)" stroke-width="2">
    <line x1="600" y1="300" x2="994" y2="300" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Node: Human designer (left) -->
  <g filter="url(#glow)">
    <circle cx="160" cy="300" r="42" fill="#0f1117" stroke="#00BCEB" stroke-width="2" opacity="0.9"/>
    <circle cx="160" cy="300" r="38" fill="url(#nodeGrad1)" fill-opacity="0.15"/>
    <!-- Person icon -->
    <circle cx="160" cy="290" r="10" fill="#00BCEB" fill-opacity="0.8"/>
    <path d="M138 322 C138 308 148 302 160 302 C172 302 182 308 182 322" stroke="#00BCEB" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  </g>

  <!-- Node: AI / Agent (center) -->
  <g filter="url(#glow)">
    <circle cx="600" cy="300" r="52" fill="#0f1117" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.95"/>
    <circle cx="600" cy="300" r="46" fill="url(#nodeGrad2)" fill-opacity="0.12"/>
    <!-- Spark icon -->
    <path d="M600 268 L610 292 L632 292 L616 308 L622 332 L600 318 L578 332 L584 308 L568 292 L590 292 Z" fill="url(#accentGrad)" opacity="0.9"/>
  </g>

  <!-- Node: Output / Design -->
  <g filter="url(#glow)">
    <circle cx="1040" cy="300" r="42" fill="#0f1117" stroke="#8B5CF6" stroke-width="2" opacity="0.9"/>
    <circle cx="1040" cy="300" r="38" fill="url(#nodeGrad2)" fill-opacity="0.15"/>
    <!-- Code/frame icon -->
    <rect x="1024" y="286" width="32" height="28" rx="4" stroke="#8B5CF6" stroke-width="1.8" fill="none" opacity="0.8"/>
    <line x1="1024" y1="294" x2="1056" y2="294" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <circle cx="1029" cy="290" r="1.5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="1034" cy="290" r="1.5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="1039" cy="290" r="1.5" fill="#8B5CF6" opacity="0.8"/>
  </g>

  <!-- Mid workflow nodes -->
  <g opacity="0.7">
    <circle cx="365" cy="210" r="18" fill="#0f1117" stroke="#00BCEB" stroke-width="1.5"/>
    <circle cx="365" cy="390" r="18" fill="#0f1117" stroke="#00BCEB" stroke-width="1.5"/>
    <circle cx="790" cy="215" r="18" fill="#0f1117" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="790" cy="385" r="18" fill="#0f1117" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>

  <!-- Labels for mid nodes -->
  <text x="365" y="185" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="11">Prompt</text>
  <text x="365" y="418" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="11">Review</text>
  <text x="790" y="195" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="11">Iterate</text>
  <text x="790" y="408" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="11">Refine</text>

  <!-- Labels -->
  <text x="160" y="356" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Designer</text>
  <text x="600" y="370" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">AI Agent</text>
  <text x="1040" y="356" text-anchor="middle" fill="#9ca3b0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Output</text>

  <!-- Rainbow accent line at bottom -->
  <rect x="480" y="565" width="240" height="3" rx="1.5" fill="url(#accentGrad)"/>
</svg>
